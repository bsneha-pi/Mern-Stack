<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Movie Ticket Booking System</title>
</head>
<body>
    <h1>Online Movie Ticket Booking System</h1>
    <form>
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your name" required><br><br>

        <label>Email Address:</label>
        <input type="email" name="email" placeholder="Enter your email" required><br><br>

        <label>Phone Number:</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" required><br><br>

        <Select name="Movie">
            <option>Movie 1</option>
            <option>Movie 2</option>
            <option>Movie 3</option>
        </Select><br><br>

        <label>Select Date:</label>
        <input type="date" name="date" required><br><br>
        
        <label>Select Show Time:</label>
        <input type="time" name="showtime" required><br><br>

        <label>Number of Tickets:</label>
        <input type="number" name="tickets" min="1" required><br><br>

        <label>Seat Type:</label>
        
        <label>Regular</label>
        <input type="radio" name="seat" value="Regular">
        
        <label>VIP</label>
        <input type="radio" name="seat" value="VIP">
        
        <label>Premium</label>
        <input type="radio" name="seat" value="Premium"><br><br>

        <label>Food Options:</label>
        <label>Popcorn</label>
        <input type="checkbox" name="food" value="Popcorn">
        
        <label>Cold Drink</label>
        <input type="checkbox" name="food" value="Cold Drink">
        
        <label>Nachos</label>
        <input type="checkbox" name="food" value="Nachos"><br><br>

        <label>Special Request:</label><br>
        <textarea name="request" placeholder="Enter your special request"></textarea><br><br>
        
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>





    </form>
</body>
</html>
