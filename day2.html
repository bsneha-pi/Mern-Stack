<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my web page</title>
</head>
<body>
    <h1>Web Page</h1>

    <img src="slotimages.jpg" alt="my profile picture">
    
    <a href="https://www.google.com">Visit Google</a><br>
    
    <form>
        <label>name:</label>
        <input type="text" name="name" placeholder="Enter your name" required><br>
        <label>email:</label>
        <input type="email" name="email" placeholder="Enter your email" required><br>
        <label>password:</label>
        <input type="password" name="password" placeholder="Enter your password" required><br>
        <label>phone:</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" required><br>
       <label>male</label>
        <input type="radio" name="gender" value="male" id="male">
        <label>female</label>
        <input type="radio" name="gender" value="female" id="female"><br>
        <select name="department">
            <option>child</option>
            <option>adult</option>
        </select><br>
        <label>address:</label>
        <textarea name="address" placeholder="Enter your address" required></textarea><br>
        <label>upload your file:</label>
        <input type="file" name="file" required><br>

        <button>Submit</button><br>
    </form>
</body>
</html>
